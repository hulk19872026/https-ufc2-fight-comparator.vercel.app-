<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UFC Fight Night 271 — Fighter Comparator</title>
  <meta name="description" content="Live UFC Fight Night 271 fighter stats comparator. Compare all 13 fights on the Adesanya vs Pyfer card with win probabilities and predicted win methods." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b;
      --bg2: #111114;
      --bg3: #18181c;
      --bg4: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f0;
      --text2: #a0a0a8;
      --text3: #5a5a65;
      --blue: #3b82f6;
      --blue-dim: #1d4ed8;
      --blue-bg: rgba(59,130,246,0.12);
      --red: #ef4444;
      --red-dim: #b91c1c;
      --red-bg: rgba(239,68,68,0.12);
      --gold: #f59e0b;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --amber-bg: rgba(245,158,11,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* HEADER */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--text);
    }
    .logo span { color: var(--red); }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--red-bg);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--red);
      letter-spacing: .04em;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    .event-info {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .03em;
    }

    /* MAIN */
    .main {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.25rem;
      background: var(--bg3);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      border-radius: 7px;
      cursor: pointer;
      transition: all .18s;
      border: none;
      background: transparent;
      font-family: 'Barlow', sans-serif;
    }
    .tab:hover { color: var(--text); background: var(--bg4); }
    .tab.active { background: var(--bg4); color: var(--text); border: 1px solid var(--border2); }

    /* DROPDOWN */
    .dropdown-section { margin-bottom: 1.25rem; }
    .dropdown-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%;
      padding: 11px 40px 11px 14px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 10px;
      appearance: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: border-color .15s;
    }
    .select-wrap select:focus { outline: none; border-color: var(--blue); }
    .select-wrap select option { background: #1a1a22; }
    .select-wrap select optgroup { color: var(--text3); font-size: 11px; }
    .chevron {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text3);
      font-size: 12px;
    }

    /* VS BAR */
    .vs-bar {
      display: grid;
      grid-template-columns: 1fr 64px 1fr;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1rem;
    }
    .f-blue { text-align: right; }
    .f-red { text-align: left; }
    .f-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      line-height: 1.2;
    }
    .f-nick { font-size: 10px; color: var(--text3); margin-top: 2px; font-style: italic; }
    .f-rec { font-size: 12px; font-weight: 500; margin-top: 3px; }
    .f-form { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: .08em; }
    .rank-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 4px;
      letter-spacing: .04em;
    }
    .rank-blue { background: var(--blue-bg); color: var(--blue); }
    .rank-red { background: var(--red-bg); color: var(--red); }
    .vs-center { text-align: center; }
    .vs-pill {
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .05em;
    }
    .weight-class {
      font-size: 9px;
      color: var(--text3);
      margin-bottom: 6px;
      letter-spacing: .04em;
    }

    /* WIN METHOD BOX */
    .wm-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1rem;
    }
    .wm-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .wm-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .wm-pick {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 3px 12px;
      border-radius: 20px;
    }
    .wm-ko { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .wm-sub { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }
    .wm-dec { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .wm-tko { background: var(--amber-bg); color: var(--gold); border: 1px solid rgba(245,158,11,.2); }
    .wm-reason { font-size: 12px; color: var(--text2); line-height: 1.6; }

    /* STAT SECTIONS */
    .section { margin-bottom: 1rem; }
    .section-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .sv-l { text-align: right; font-size: 13px; font-weight: 500; }
    .sv-r { text-align: left; font-size: 13px; font-weight: 500; }
    .sl { text-align: center; font-size: 10px; color: var(--text3); line-height: 1.3; }
    .bar-row {
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      gap: 4px;
      margin-bottom: 8px;
      align-items: center;
    }
    .bar-track { height: 4px; border-radius: 3px; background: var(--bg4); overflow: hidden; }
    .bar-l .bar-fill { height: 100%; border-radius: 3px; background: var(--blue); float: right; }
    .bar-r .bar-fill { height: 100%; border-radius: 3px; background: var(--red); }
    .adv-l { color: var(--blue); }
    .adv-r { color: var(--red); }

    /* FINISH GRID */
    .finish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .finish-card {
      background: var(--bg4);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .finish-card h4 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 7px;
    }
    .finish-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .finish-type { font-size: 11px; color: var(--text2); }
    .finish-val { font-size: 12px; font-weight: 500; }
    .finish-rate-row {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    /* PROBABILITY */
    .prob-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .prob-card {
      background: var(--bg4);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .prob-pct {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 3px;
    }
    .prob-name { font-size: 11px; color: var(--text2); }
    .prob-pct-blue { color: var(--blue); }
    .prob-pct-red { color: var(--red); }
    .prob-bar-track {
      height: 7px;
      border-radius: 4px;
      background: var(--bg4);
      overflow: hidden;
      display: flex;
      margin-bottom: 4px;
    }
    .pb-blue { background: var(--blue); height: 100%; }
    .pb-red { background: var(--red); height: 100%; }
    .prob-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    /* DRAFTKINGS ODDS */
    .odds-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1rem;
    }
    .odds-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .odds-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .dk-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(98,203,93,0.12);
      color: #62cb5d;
      border: 1px solid rgba(98,203,93,0.2);
      letter-spacing: .04em;
    }
    .odds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .odds-card {
      background: var(--bg4);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .odds-fighter { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .odds-line {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }
    .odds-fav { color: var(--red); }
    .odds-dog { color: var(--gold); }
    .odds-pick { color: var(--blue); }
    .odds-implied { font-size: 10px; color: var(--text3); margin-top: 3px; }
    .odds-note { font-size: 11px; color: var(--text3); text-align: center; font-style: italic; }
    .odds-props { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .odds-prop {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--bg4);
      color: var(--text3);
      border: 1px solid var(--border);
    }
    .odds-prop span { color: var(--gold); font-weight: 600; }

    /* TALENT LEVEL */
    .talent-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1rem;
    }
    .talent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .talent-card {
      background: var(--bg4);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .talent-card h5 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .talent-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .talent-label { font-size: 10px; color: var(--text3); }
    .talent-stars { display: flex; gap: 2px; }
    .star { width: 8px; height: 8px; border-radius: 1px; }
    .star-on { background: var(--gold); }
    .star-off { background: var(--bg3); border: 1px solid var(--border2); }
    .tier-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: .04em;
      margin-top: 5px;
    }
    .tier-elite { background: rgba(245,158,11,.15); color: var(--gold); border: 1px solid rgba(245,158,11,.25); }
    .tier-contender { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }
    .tier-prospect { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .tier-veteran { background: rgba(160,160,168,.1); color: var(--text2); border: 1px solid var(--border2); }
    .tier-gatekeeper { background: rgba(160,160,168,.08); color: var(--text3); border: 1px solid var(--border); }

    /* NOTABLE WINS */
    .wins-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 1rem;
    }
    .wins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .wins-card {
      background: var(--bg4);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .wins-card h5 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .win-entry { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 5px; }
    .win-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .win-dot-blue { background: var(--blue); }
    .win-dot-red { background: var(--red); }
    .win-name { font-size: 11px; color: var(--text); line-height: 1.3; }
    .win-detail { font-size: 10px; color: var(--text3); }
    .hof-badge {
      display: inline-block;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(245,158,11,.2);
      color: var(--gold);
      border: 1px solid rgba(245,158,11,.3);
      margin-left: 4px;
      letter-spacing: .04em;
      vertical-align: middle;
    }
    .champ-badge {
      display: inline-block;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(59,130,246,.15);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,.25);
      margin-left: 4px;
      letter-spacing: .04em;
      vertical-align: middle;
    }
    .no-wins { font-size: 11px; color: var(--text3); font-style: italic; }

    /* ANALYSIS */
    .analysis-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .analysis-edge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      margin-bottom: 8px;
    }
    .analysis-p { font-size: 12px; color: var(--text2); line-height: 1.65; margin-bottom: 5px; }
    .deep-btn {
      margin-top: 10px;
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--blue);
      background: var(--blue-bg);
      color: var(--blue);
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: .02em;
    }
    .deep-btn:hover { background: var(--blue); color: #fff; }
    .deep-btn:disabled { opacity: .5; cursor: not-allowed; }
    .deep-btn .btn-icon { font-size: 14px; }

    /* AI ANALYSIS PANEL */
    .ai-panel {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .ai-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .ai-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--blue);
    }
    .ai-model-badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,.2);
    }
    .ai-content {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .ai-content strong { color: var(--text); font-weight: 600; }
    .ai-thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text3);
    }
    .ai-thinking-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--blue);
      margin: 0 2px;
      animation: dotpulse 1.2s infinite;
    }
    .ai-thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .ai-thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotpulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .ai-error {
      font-size: 12px;
      color: var(--red);
      padding: 8px 12px;
      background: var(--red-bg);
      border-radius: 8px;
      border: 1px solid rgba(239,68,68,.2);
    }

    /* CUSTOM TAB */
    .custom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .custom-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .custom-card h4 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 8px;
    }
    .input-row label { font-size: 10px; color: var(--text3); letter-spacing: .04em; }
    .input-row input {
      padding: 6px 9px;
      font-size: 12px;
      background: var(--bg4);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Barlow', sans-serif;
      transition: border-color .15s;
    }
    .input-row input:focus { outline: none; border-color: var(--blue); }
    .compare-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .compare-btn:hover { background: var(--blue-dim); }
    #customResult { margin-top: 1.25rem; }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 11px;
      color: var(--text3);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* MOBILE */
    @media (max-width: 520px) {
      .custom-grid { grid-template-columns: 1fr; }
      .vs-bar { grid-template-columns: 1fr 48px 1fr; padding: 10px; gap: 6px; }
      .f-name { font-size: 13px; }
      .stat-row { grid-template-columns: 1fr 90px 1fr; }
      .bar-row { grid-template-columns: 1fr 90px 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">UFC<span>Stats</span></div>
      <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    </div>
    <div class="event-info">Fight Night 271 · Seattle · Mar 28, 2026</div>
  </div>
</header>

<main class="main">
  <div class="tabs">

function calcProb(a, b) {
  let sA = 0, sB = 0;
  sA += a.sacc * .20; sB += b.sacc * .20;
  sA += a.sdef * .12; sB += b.sdef * .12;
  sA += a.tdacc * .08; sB += b.tdacc * .08;
  sA += a.tddef * .08; sB += b.tddef * .08;
  const finA = (a.ko + a.sub) / (a.ko + a.sub + a.dec + 1) * 100;
  const finB = (b.ko + b.sub) / (b.ko + b.sub + b.dec + 1) * 100;
  sA += finA * .15; sB += finB * .15;
  sA += Math.max(0, 35 - a.age) * .4; sB += Math.max(0, 35 - b.age) * .4;
  sA += a.reach * .05; sB += b.reach * .05;
  const fm = {W:2, L:-2, D:0};
  (a.form || '').split(' ').forEach(r => { sA += (fm[r] || 0); });
  (b.form || '').split(' ').forEach(r => { sB += (fm[r] || 0); });
  const t = sA + sB;
  const pA = Math.round((sA / t) * 100);
  return [pA, 100 - pA];
}

function bw(va, vb) {
  const mn = Math.min(va, vb), mx = Math.max(va, vb), rng = mx - mn || 1;
  return [Math.round(40 + ((va - mn) / rng) * 55), Math.round(40 + ((vb - mn) / rng) * 55)];
}

function wmClass(m) { return {ko:'wm-ko', sub:'wm-sub', dec:'wm-dec', tko:'wm-tko'}[m] || 'wm-ko'; }

function row(lbl, va, vb, higher = true, isText = false) {
  const nA = parseFloat(va) || 0, nB = parseFloat(vb) || 0;
  let clA = '', clB = '';
  if (!isText) {
    if (higher) { if (nA > nB) clA = 'adv-l'; else if (nB > nA) clB = 'adv-r'; }
    else { if (nA < nB) clA = 'adv-l'; else if (nB < nA) clB = 'adv-r'; }
  }
  const [bA, bB] = isText ? [60, 60] : bw(nA, nB);
  return `
    <div class="stat-row">
      <div class="sv-l"><span class="${clA}">${va}</span></div>
      <div class="sl">${lbl}</div>
      <div class="sv-r"><span class="${clB}">${vb}</span></div>
    </div>
    ${isText ? '' : `<div class="bar-row"><div class="bar-track bar-l"><div class="bar-fill" style="width:${bA}%"></div></div><div></div><div class="bar-track bar-r"><div class="bar-fill" style="width:${bB}%"></div></div></div>`}`;
}

function renderComp(a, b, wm, label, odds) {
  const prob = calcProb(a, b);
  const wName = prob[0] >= prob[1] ? a.name.split(' ')[0] : b.name.split(' ')[0];
  const wCol = prob[0] >= prob[1] ? 'var(--blue)' : 'var(--red)';
  const finRateA = Math.round((a.ko + a.sub) / (a.ko + a.sub + a.dec) * 100) || 0;
  const finRateB = Math.round((b.ko + b.sub) / (b.ko + b.sub + b.dec) * 100) || 0;

  function implied(line) {
    if (!line) return '—';
    const n = parseInt(line);
    if (n < 0) return Math.round(Math.abs(n)/(Math.abs(n)+100)*100)+'%';
    return Math.round(100/(n+100)*100)+'%';
  }

  function isFav(line) { return line && line.startsWith('-'); }

  function oddsSection() {
    if (!odds) return '';
    const aFav = isFav(odds.aLine);

  function stars(n, max=5) {

  function tierBadge(tier) {

function selectFight(idx) {
  const f = FIGHTS[parseInt(idx)];
  document.getElementById('fightDisplay').innerHTML = renderComp(f.a, f.b, f.wm, f.label, f.odds);
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cardTab').style.display = tab === 'card' ? 'block' : 'none';
  document.getElementById('customTab').style.display = tab === 'custom' ? 'block' : 'none';
}

function g(id) { return document.getElementById(id).value; }

function runCustom() {
  const a = {
    name: g('ca-name') || 'Fighter A', rec: g('ca-rec'), rank: 'Custom',
    age: parseInt(g('ca-age')) || 28, height: '', reach: parseInt(g('ca-reach')) || 74,
    stance: '', style: g('ca-style') || '',
    slpm: 3.5, sacc: parseFloat(g('ca-sacc')) || 48, sdef: parseFloat(g('ca-sdef')) || 55,
    tdavg: 1.0, tdacc: parseFloat(g('ca-tdacc')) || 40, tddef: parseFloat(g('ca-tddef')) || 60, subavg: 0.8,
    ko: parseInt(g('ca-ko')) || 0, sub: parseInt(g('ca-sub')) || 0, dec: parseInt(g('ca-dec')) || 0,
    form: g('ca-form') || 'W W W', streak: ''
  };
  const b = {
    name: g('cb-name') || 'Fighter B', rec: g('cb-rec'), rank: 'Custom',
    age: parseInt(g('cb-age')) || 31, height: '', reach: parseInt(g('cb-reach')) || 72,
    stance: '', style: g('cb-style') || '',
    slpm: 3.5, sacc: parseFloat(g('cb-sacc')) || 43, sdef: parseFloat(g('cb-sdef')) || 50,
    tdavg: 1.0, tdacc: parseFloat(g('cb-tdacc')) || 35, tddef: parseFloat(g('cb-tddef')) || 55, subavg: 0.7,
    ko: parseInt(g('cb-ko')) || 0, sub: parseInt(g('cb-sub')) || 0, dec: parseInt(g('cb-dec')) || 0,
    form: g('cb-form') || 'W W W', streak: ''
  };
  const prob = calcProb(a, b);
  const fa = a.ko + a.sub, fb = b.ko + b.sub;
  let method = 'dec', pick = 'Decision';
  const winner = prob[0] >= prob[1] ? a : b;
  const loser = prob[0] >= prob[1] ? b : a;
  const wf = prob[0] >= prob[1] ? fa : fb;
  const wko = prob[0] >= prob[1] ? a.ko : b.ko;
  const wsub = prob[0] >= prob[1] ? a.sub : b.sub;
  if (wf > 0) {
    if (wko >= wsub) { method = 'ko'; pick = winner.name.split(' ')[0] + ' KO/TKO'; }
    else { method = 'sub'; pick = winner.name.split(' ')[0] + ' Submission'; }
  } else { pick = winner.name.split(' ')[0] + ' Decision'; }
  const wm = {
    pick, method,
    reason: `Based on your inputs — ${a.name} finish rate: ${Math.round(fa / (fa + a.dec + 1) * 100)}% · ${b.name} finish rate: ${Math.round(fb / (fb + b.dec + 1) * 100)}%. Model probability: ${a.name.split(' ')[0]} ${prob[0]}% vs ${b.name.split(' ')[0]} ${prob[1]}%.`
  };
  document.getElementById('customResult').innerHTML = renderComp(a, b, wm, 'Custom matchup', null);
}

selectFight(0);

async function runDeepAnalysis(btn, aName, bName, aRec, bRec, aStyle, bStyle, aSacc, bSacc, aSdef, bSdef, aTdacc, bTdacc, aKo, bKo, aSub, bSub, probA, probB, pick) {
  const panel = document.getElementById('aiPanel');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⚡</span> Analyzing...';

  panel.innerHTML = `
    <div class="ai-panel">
      <div class="ai-panel-header">
        <span class="ai-label">AI Deep Analysis</span>
        <span class="ai-model-badge">Claude Sonnet</span>
      </div>
      <div class="ai-thinking">
        Generating breakdown
        <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;

  const prompt = `You are an expert MMA analyst. Give a deep fight breakdown for: ${aName} (${aRec}, ${aStyle}, str acc ${aSacc}%, str def ${aSdef}%, TD acc ${aTdacc}%, KO wins ${aKo}, Sub wins ${aSub}) vs ${bName} (${bRec}, ${bStyle}, str acc ${bSacc}%, str def ${bSdef}%, TD acc ${bTdacc}%, KO wins ${bKo}, Sub wins ${bSub}). Win probability: ${aName.split(' ')[0]} ${probA}% — ${bName.split(' ')[0]} ${probB}%. Predicted method: ${pick}.

Write a sharp, punchy breakdown covering:
1. The 3 key X-factors that will decide this fight
2. Each fighter's path to victory (2-3 sentences each)
3. Round-by-round prediction (label each round clearly)
4. Final verdict with confidence level

Be direct and specific. Use the stats to back your points. Keep it under 400 words total.`;

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      let errMsg = `HTTP ${response.status}`;
      try {
        const errJson = await response.json();
        errMsg = errJson.error || errMsg;
      } catch {}
      throw new Error(errMsg);
    }

    panel.innerHTML = `
      <div class="ai-panel">
        <div class="ai-panel-header">
          <span class="ai-label">AI Deep Analysis</span>
          <span class="ai-model-badge">Claude Sonnet</span>
        </div>
        <div class="ai-content" id="aiContent"></div>
      </div>`;

    const contentEl = document.getElementById('aiContent');
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            fullText += evt.delta.text;
            contentEl.innerHTML = formatAIText(fullText) + '<span style="opacity:.5">▋</span>';
          }
        } catch {}
      }
    }
    contentEl.innerHTML = formatAIText(fullText);
    btn.innerHTML = '<span class="btn-icon">⚡</span> Regenerate Analysis';
    btn.disabled = false;

  } catch (err) {
    const msg = err.message || 'Unknown error';
    const isKeyMissing = msg.toLowerCase().includes('anthropic_api_key') || msg.toLowerCase().includes('not set') || msg.toLowerCase().includes('environment');
    const is404 = msg.includes('404') || msg.includes('not found');
    const is401 = msg.includes('401') || msg.includes('unauthorized') || msg.includes('authentication');
    const is500 = msg.includes('500');

    let hint = '';
    if (is404) {
      hint = '<strong>404 — the /api/analyze function was not found.</strong><br>Make sure the <code>api/analyze.js</code> file is in your GitHub repo inside a folder called <code>api</code>, then redeploy on Vercel.';
    } else if (isKeyMissing || is500) {
      hint = '<strong>API key missing or not loaded.</strong><br>1. Go to Vercel → your project → Settings → Environment Variables<br>2. Add <code>ANTHROPIC_API_KEY</code> with your key<br>3. Go to Deployments → three dots → Redeploy';
    } else if (is401) {
      hint = '<strong>Invalid API key.</strong><br>Your key may be wrong or expired. Get a fresh one from <code>console.anthropic.com</code> → API Keys, then update it in Vercel Environment Variables and redeploy.';
    } else {
      hint = '<strong>Check your browser console (F12) for more detail.</strong>';
    }

    panel.innerHTML = `
      <div class="ai-panel">
        <div class="ai-error">
          <strong>Error: ${msg}</strong><br><br>${hint}
        </div>
      </div>`;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Deep AI Analysis';
    btn.disabled = false;
  }
}

function formatAIText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<strong style="color:var(--text);font-size:13px;display:block;margin-top:10px;margin-bottom:4px">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="color:var(--text);font-size:14px;display:block;margin-top:12px;margin-bottom:5px">$1</strong>')
    .replace(/^# (.+)$/gm, '<strong style="color:var(--text);font-size:15px;display:block;margin-top:12px;margin-bottom:6px">$1</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}
